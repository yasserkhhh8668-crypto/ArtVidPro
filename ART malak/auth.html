<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PixelCraft Studio | تسجيل الدخول</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-container { width: 100%; max-width: 480px; }
    .auth-card { background: white; border-radius: 28px; padding: 48px 40px; box-shadow: 0 32px 80px rgba(0,0,0,0.25); }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg,var(--accent),var(--accent-light)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: white; margin: 0 auto 16px; }
    .auth-logo h2 { color: var(--primary); margin-bottom: 6px; }
    .auth-logo p  { color: var(--gray-500); font-size: 0.9rem; margin: 0; }
    .auth-tabs { display: flex; border-radius: 14px; background: var(--gray-100); padding: 4px; margin-bottom: 32px; }
    .auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 11px; cursor: pointer; font-weight: 600; font-size: 0.9rem; color: var(--gray-500); transition: var(--transition); }
    .auth-tab.active { background: white; color: var(--accent); box-shadow: var(--shadow-sm); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--gray-400); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
    .social-auth { display: flex; gap: 12px; }
    .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px; border: 2px solid var(--gray-200); border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 600; color: var(--gray-700); cursor: pointer; transition: var(--transition); background: white; }
    .social-btn:hover { border-color: var(--accent); color: var(--accent); }
    .forgot-link { font-size: 0.85rem; color: var(--accent); float: left; }
    body.lang-en .forgot-link { float: right; }
    .back-home { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; color: rgba(255,255,255,0.75); font-size: 0.9rem; }
    .back-home a { color: white; font-weight: 600; }
    .pass-toggle { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray-400); }
    body.lang-en .pass-toggle { left: auto; right: 14px; }
    .pass-wrap { position: relative; }
    .pass-wrap .form-control { padding-left: 44px; }
    body.lang-en .pass-wrap .form-control { padding-left: 16px; padding-right: 44px; }
    .strength-bar { height: 4px; border-radius: 4px; background: var(--gray-200); margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 4px; transition: var(--transition); width: 0; }
    .strength-text { font-size: 0.75rem; margin-top: 4px; }
    @media(max-width:480px){ .auth-card { padding: 32px 24px; border-radius: 20px; } }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-pen-nib"></i></div>
      <h2 id="authTitle">مرحباً بعودتك</h2>
      <p id="authSubtitle">سجّل دخولك للوصول إلى حسابك</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">حساب جديد</div>
    </div>

    <!-- Alert Area -->
    <div id="authAlert" class="hidden"></div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label><i class="fas fa-envelope" style="color:var(--accent);margin-left:6px"></i> البريد الإلكتروني</label>
        <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required style="direction:ltr;text-align:right"/>
      </div>
      <div class="form-group">
        <label>
          <i class="fas fa-lock" style="color:var(--accent);margin-left:6px"></i> كلمة المرور
          <a href="#" class="forgot-link" onclick="showForgotModal()">نسيت كلمة المرور؟</a>
        </label>
        <div class="pass-wrap">
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required/>
          <span class="pass-toggle" onclick="togglePass('loginPassword',this)"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
        <input type="checkbox" id="rememberMe" style="width:16px;height:16px;accent-color:var(--accent)"/>
        <label for="rememberMe" style="font-size:0.85rem;color:var(--gray-600);margin:0">تذكّرني</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
      </button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group" style="margin-bottom:0">
          <label><i class="fas fa-user" style="color:var(--accent);margin-left:6px"></i> الاسم الكامل</label>
          <input type="text" class="form-control" id="regName" placeholder="أحمد محمد" required/>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label><i class="fas fa-phone" style="color:var(--accent);margin-left:6px"></i> رقم الهاتف</label>
          <input type="tel" class="form-control" id="regPhone" placeholder="+966 5X XXX XXXX" style="direction:ltr"/>
        </div>
      </div>
      <div class="form-group" style="margin-top:16px">
        <label><i class="fas fa-envelope" style="color:var(--accent);margin-left:6px"></i> البريد الإلكتروني</label>
        <input type="email" class="form-control" id="regEmail" placeholder="your@email.com" required style="direction:ltr;text-align:right"/>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock" style="color:var(--accent);margin-left:6px"></i> كلمة المرور</label>
        <div class="pass-wrap">
          <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required oninput="checkStrength(this.value)"/>
          <span class="pass-toggle" onclick="togglePass('regPassword',this)"><i class="fas fa-eye"></i></span>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock" style="color:var(--accent);margin-left:6px"></i> تأكيد كلمة المرور</label>
        <div class="pass-wrap">
          <input type="password" class="form-control" id="regConfirm" placeholder="••••••••" required/>
          <span class="pass-toggle" onclick="togglePass('regConfirm',this)"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:24px">
        <input type="checkbox" id="agreeTerms" required style="width:16px;height:16px;accent-color:var(--accent);margin-top:3px;flex-shrink:0"/>
        <label for="agreeTerms" style="font-size:0.85rem;color:var(--gray-600);margin:0;line-height:1.5">
          أوافق على <a href="#" style="color:var(--accent)">شروط الاستخدام</a> و<a href="#" style="color:var(--accent)">سياسة الخصوصية</a>
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
        <i class="fas fa-user-plus"></i> إنشاء الحساب
      </button>
    </form>

    <div class="divider">أو</div>

    <div class="social-auth">
      <button class="social-btn" onclick="showToast('قريباً: تسجيل الدخول بـ Google','info')">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="Google"/>
        Google
      </button>
      <button class="social-btn" onclick="showToast('قريباً: تسجيل الدخول بـ Facebook','info')">
        <i class="fab fa-facebook" style="color:#1877f2;font-size:1.1rem"></i>
        Facebook
      </button>
    </div>
  </div>

  <div class="back-home">
    <i class="fas fa-home"></i>
    <a href="index.html">العودة للرئيسية</a>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3>استعادة كلمة المرور</h3>
      <div class="modal-close" onclick="document.getElementById('forgotModal').classList.remove('show')"><i class="fas fa-times"></i></div>
    </div>
    <p style="color:var(--gray-500);font-size:0.9rem;margin-bottom:20px">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور.</p>
    <div class="form-group">
      <label>البريد الإلكتروني</label>
      <input type="email" class="form-control" id="forgotEmail" placeholder="your@email.com" style="direction:ltr;text-align:right"/>
    </div>
    <button class="btn btn-primary btn-block" onclick="sendResetLink()">
      <i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة
    </button>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  // Check URL params
  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get('mode') || 'login';
  const redirect = urlParams.get('redirect') || 'index.html';

  // If already logged in
  if (isLoggedIn()) {
    window.location.href = isAdmin() ? 'admin.html' : 'dashboard.html';
  }

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    document.getElementById('authTitle').textContent = isLogin ? 'مرحباً بعودتك' : 'إنشاء حساب جديد';
    document.getElementById('authSubtitle').textContent = isLogin ? 'سجّل دخولك للوصول إلى حسابك' : 'انضم إلينا وابدأ رحلتك الإبداعية';
    document.getElementById('authAlert').innerHTML = '';
    document.getElementById('authAlert').className = 'hidden';
  }

  // Init based on URL
  if (mode === 'register') switchTab('register');

  function showAlert(msg, type = 'danger') {
    const el = document.getElementById('authAlert');
    const icons = { danger: 'fa-times-circle', success: 'fa-check-circle', info: 'fa-info-circle' };
    el.className = `alert alert-${type}`;
    el.innerHTML = `<i class="fas ${icons[type]}"></i> ${msg}`;
  }

  function setBtnLoading(id, loading, text) {
    const btn = document.getElementById(id);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<i class="fas fa-spinner fa-spin"></i> جارٍ المعالجة...`
      : text;
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;
    setBtnLoading('loginBtn', true);
    const result = await loginUser(email, pass);
    setBtnLoading('loginBtn', false, '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول');
    if (result.success) {
      showAlert('✅ تم تسجيل الدخول بنجاح! يتم التحويل...', 'success');
      setTimeout(() => {
        if (result.user.role === 'admin') window.location.href = 'admin.html';
        else window.location.href = decodeURIComponent(redirect);
      }, 1000);
    } else {
      showAlert(result.message);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const name    = document.getElementById('regName').value.trim();
    const phone   = document.getElementById('regPhone').value.trim();
    const email   = document.getElementById('regEmail').value.trim();
    const pass    = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    if (pass !== confirm) { showAlert('كلمتا المرور غير متطابقتين'); return; }
    if (pass.length < 6)  { showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }
    setBtnLoading('registerBtn', true);
    const result = await registerUser(name, email, pass, phone);
    setBtnLoading('registerBtn', false, '<i class="fas fa-user-plus"></i> إنشاء الحساب');
    if (result.success) {
      showAlert('🎉 تم إنشاء حسابك بنجاح! يتم التحويل...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } else {
      showAlert(result.message);
    }
  }

  function togglePass(id, btn) {
    const input = document.getElementById(id);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.innerHTML = `<i class="fas ${isText ? 'fa-eye' : 'fa-eye-slash'}"></i>`;
  }

  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { pct: '20%', color: '#ef4444', label: 'ضعيفة جداً' },
      { pct: '40%', color: '#f59e0b', label: 'ضعيفة' },
      { pct: '60%', color: '#f59e0b', label: 'متوسطة' },
      { pct: '80%', color: '#22c55e', label: 'قوية' },
      { pct: '100%', color: '#16a34a', label: 'قوية جداً ✅' },
    ];
    const l = levels[Math.max(0, score - 1)] || levels[0];
    fill.style.width = val ? l.pct : '0';
    fill.style.background = l.color;
    text.textContent = val ? l.label : '';
    text.style.color = l.color;
  }

  function showForgotModal() {
    document.getElementById('forgotModal').classList.add('show');
  }

  function sendResetLink() {
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) { showToast('أدخل بريدك الإلكتروني', 'warning'); return; }
    showToast('تم إرسال رابط استعادة كلمة المرور! (تجريبي)', 'success');
    document.getElementById('forgotModal').classList.remove('show');
  }

  document.getElementById('forgotModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });
</script>
</body>
</html>
