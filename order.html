<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خدمة | ArtVidPro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .order-section {
            min-height: 100vh;
            padding: 120px 5% 5rem;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        }
        .order-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .order-title {
            text-align: center;
            color: var(--primary);
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        .offer-badge {
            background: var(--secondary);
            color: var(--primary);
            text-align: center;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-weight: bold;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .order-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="header-place"></div>
    
    <section class="order-section">
        <div class="order-container">
            <h1 class="order-title">📋 طلب خدمة</h1>
            
            <div class="offer-badge">
                🎬 عرض 48 ساعة: فيديو ريلز احترافي + نص تعليقي + موسيقى 🎬
            </div>
            
            <form id="orderForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>👤 الاسم الكامل *</label>
                        <input type="text" id="name" required placeholder="مثال: محمد أحمد">
                    </div>
                    <div class="form-group">
                        <label>📞 رقم الهاتف *</label>
                        <input type="tel" id="phone" required placeholder="مثال: 0555123456">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>📧 البريد الإلكتروني</label>
                        <input type="email" id="email" placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label>🎬 نوع الخدمة *</label>
                        <select id="serviceType" required>
                            <option value="">اختر الخدمة</option>
                            <option value="فيديو ريلز 48 ساعة">📱 فيديو ريلز 48 ساعة</option>
                            <option value="فيديو تجاري">🏪 فيديو تجاري</option>
                            <option value="تصوير أفراح">💍 تصوير أفراح</option>
                            <option value="فيديو تعريفي">🎥 فيديو تعريفي للعلامة التجارية</option>
                            <option value="مونتاج فقط">✂️ مونتاج فقط</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>💰 الميزانية المقترحة (دج)</label>
                        <select id="budget">
                            <option value="">اختر الميزانية</option>
                            <option value="10000-30000">10000 - 30000 دج</option>
                            <option value="30000-60000">30000 - 60000 دج</option>
                            <option value="60000-100000">60000 - 100000 دج</option>
                            <option value="100000+">أكثر من 100000 دج</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📅 التاريخ المطلوب</label>
                        <input type="date" id="preferredDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>💬 تفاصيل الطلب *</label>
                    <textarea id="message" rows="4" required placeholder="اكتب تفاصيل طلبك... مثلاً: نوع الفيديو، المدة، الفكرة، المكان..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%; padding:1rem; font-size:1.1rem;">
                    🚀 إرسال الطلب
                </button>
                
                <div id="message" class="message"></div>
            </form>
            
            <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--gray);">
                <p>📱 للاستفسار السريع: <strong>واتساب</strong> أو <strong>تلغرام</strong></p>
                <p>✓ سنتواصل معك خلال 24 ساعة | ✓ خدمة آمنة | ✓ جودة مضمونة</p>
            </div>
        </div>
    </section>
    
    <div id="footer-place"></div>
    <div id="whatsapp-place"></div>
    
    <script src="js/app.js"></script>
    <script>
        // Override form submission for order page specifically
        const orderForm = document.getElementById('orderForm');
        if (orderForm) {
            orderForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const formData = {
                    name: document.getElementById('name').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value || '',
                    serviceType: document.getElementById('serviceType').value,
                    budget: document.getElementById('budget').value || 'غير محدد',
                    preferredDate: document.getElementById('preferredDate').value || 'غير محدد',
                    message: document.getElementById('message').value
                };
                
                const submitBtn = orderForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'جاري الإرسال...';
                
                try {
                    const response = await fetch('http://localhost:3000/api/orders', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        document.getElementById('message').innerHTML = `
                            ✅ <strong>تم إرسال طلبك بنجاح!</strong><br>
                            رقم الطلب: #${result.id}<br>
                            سنتواصل معك خلال 24 ساعة على رقم ${formData.phone}
                        `;
                        document.getElementById('message').className = 'message success';
                        orderForm.reset();
                        
                        // إشعار إضافي للمستخدم
                        setTimeout(() => {
                            window.open(`https://wa.me/213XXXXXXXXX?text=مرحباً، لقد أرسلت طلباً جديداً على ArtVidPro، رقم الطلب #${result.id}`, '_blank');
                        }, 1500);
                    } else {
                        throw new Error(result.error || 'حدث خطأ');
                    }
                } catch (error) {
                    document.getElementById('message').innerHTML = `❌ ${error.message}<br>الرجاء المحاولة مرة أخرى أو الاتصال بنا مباشرة على واتساب`;
                    document.getElementById('message').className = 'message error';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 إرسال الطلب';
                }
            });
        }
    </script>
</body>
</html>
