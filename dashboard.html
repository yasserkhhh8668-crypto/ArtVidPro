<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - ArtVidPro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-place"></div>
    
    <section class="section">
        <h2 class="section-title">📊 لوحة تحكم المشرف</h2>
        
        <div class="grid" id="stats-grid">
            <div class="card">
                <div class="card-content">
                    <h3>📦 الطلبات</h3>
                    <p id="total-orders">0</p>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <h3>⏳ طلبات معلقة</h3>
                    <p id="pending-orders">0</p>
                </div>
            </div>
            <div class="card">
                <div class="card-content">
                    <h3>💬 رسائل العملاء</h3>
                    <p id="total-contacts">0</p>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h3>📋 قائمة الطلبات</h3>
            <table style="width:100%; background:white; border-radius:12px; overflow:hidden;">
                <thead style="background:var(--primary); color:white;">
                    <tr><th>الاسم</th><th>الهاتف</th><th>الخدمة</th><th>الحالة</th><th>تاريخ</th></tr>
                </thead>
                <tbody id="orders-table"></tbody>
            </table>
        </div>
    </section>
    
    <div id="footer-place"></div>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = 'auth.html';
        }
        
        async function loadStats() {
            const response = await fetch(`${API_URL}/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stats = await response.json();
            document.getElementById('total-orders').textContent = stats.totalOrders;
            document.getElementById('pending-orders').textContent = stats.pendingOrders;
            document.getElementById('total-contacts').textContent = stats.totalContacts;
        }
        
        async function loadOrders() {
            const response = await fetch(`${API_URL}/orders`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const orders = await response.json();
            const tbody = document.getElementById('orders-table');
            tbody.innerHTML = orders.map(order => `
                <tr style="border-bottom:1px solid #ddd;">
                    <td style="padding:12px;">${order.name}</td>
                    <td style="padding:12px;">${order.phone}</td>
                    <td style="padding:12px;">${order.serviceType}</td>
                    <td style="padding:12px;">${order.status}</td>
                    <td style="padding:12px;">${new Date(order.date).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }
        
        loadStats();
        loadOrders();
    </script>
    <script src="js/app.js"></script>
</body>
</html>
